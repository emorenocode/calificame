<div class="card flex justify-center">
  <p-select
    optionLabel="name"
    placeholder="Select a City"
    class="w-full md:w-56"
    [options]="establishmentsList"
    [(ngModel)]="selectedEstablishment"
    (onChange)="getSurveysByEstablishment()"
  />
</div>

<p-button label="Create Question" icon="pi pi-question" (onClick)="onCreateSurvey()" />

<div>
  @for (survey of surveysList(); track $index) {
    <div>
      {{ survey.question }}
    </div>
  }
</div>
