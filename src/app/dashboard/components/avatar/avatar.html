@if (username()) {
  <div class="flex justify-center items-center h-8 w-8 rounded-full bg-white text-black">
    <span class="select-none">{{ username() }}</span>
  </div>
} @else {
  <img
    class="h-8 w-8 rounded-full bg-white"
    width="32"
    height="32"
    ngSrc="{{ currentUser()?.photoURL }}"
    alt="{{ currentUser()?.name }}"
    title="{{ currentUser()?.name }}"
    (error)="onErrorLoadingImg()"
  />
}
